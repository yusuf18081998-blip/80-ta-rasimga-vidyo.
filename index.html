<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasmlarni Videoga Aylantir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-section {
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .upload-hint {
            color: #999;
            font-size: 13px;
        }
        #fileInput {
            display: none;
        }
        .settings {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .setting-group {
            margin-bottom: 15px;
        }
        .setting-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="number"], input[type="range"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        input[type="range"] {
            padding: 0;
            height: 6px;
        }
        .range-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }
        .image-list {
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        .image-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: white;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 13px;
            color: #666;
        }
        .image-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 10px;
        }
        .image-item .remove-btn {
            margin-left: auto;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .image-item .remove-btn:hover {
            background: #ff5252;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .preview-section {
            margin-top: 30px;
            display: none;
        }
        .preview-title {
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        #preview {
            width: 100%;
            border-radius: 10px;
            background: #000;
            max-height: 400px;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Rasmlarni Videoga Aylantir</h1>
        <p class="subtitle">80 ta rasmingizni GIF videoga aylantiring - bepul va oson!</p>
        
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Rasmlarni shu yerga drag qiling yoki bosing</div>
                <div class="upload-hint">PNG, JPG, JPEG formatida, maksimal 80 ta rasm</div>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="settings">
            <div class="setting-group">
                <label for="duration">
                    Har bir rasmning davomiyligi (sekund)
                    <span class="range-value" id="durationValue">1</span>
                </label>
                <input type="range" id="duration" min="0.2" max="5" step="0.2" value="1">
            </div>
            
            <div class="setting-group">
                <label for="quality">GIF sifati (yuqori = katta fayl)</label>
                <select id="quality">
                    <option value="10">Tez yuklanish (kam sifat)</option>
                    <option value="5" selected>Standart</option>
                    <option value="3">Yaxshi sifat</option>
                    <option value="2">Juda yaxshi sifat</option>
                </select>
            </div>
        </div>

        <div class="image-list" id="imageList" style="display: none;">
            <strong style="display: block; margin-bottom: 10px;">Yuklangan rasmlar (<span id="imageCount">0</span>):</strong>
            <div id="imageItems"></div>
        </div>

        <div class="button-group">
            <button class="btn-secondary" id="clearBtn">Tozalash</button>
            <button class="btn-primary" id="generateBtn" disabled>GIF Yaratish</button>
        </div>

        <div class="status" id="status"></div>

        <div class="preview-section" id="previewSection">
            <div class="preview-title">Tasvir:</div>
            <img id="preview" alt="GIF preview" style="width: 100%; border-radius: 10px; background: #000; max-height: 400px;">
            <button class="btn-primary" id="downloadBtn" style="margin-top: 15px; width: 100%;">📥 GIF ni Yuklab Ol</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageList = document.getElementById('imageList');
        const imageItems = document.getElementById('imageItems');
        const imageCount = document.getElementById('imageCount');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const previewSection = document.getElementById('previewSection');
        const preview = document.getElementById('preview');
        const durationInput = document.getElementById('duration');
        const durationValue = document.getElementById('durationValue');
        
        let images = [];
        let gifBlob = null;

        durationInput.addEventListener('input', (e) => {
            durationValue.textContent = e.target.value;
        });

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length > 80) {
                showStatus('Maksimal 80 ta rasm yuklashi mumkin!', 'error');
                return;
            }

            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        images.push({
                            src: e.target.result,
                            name: file.name
                        });
                        updateImageList();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function updateImageList() {
            imageCount.textContent = images.length;
            imageList.style.display = images.length > 0 ? 'block' : 'none';
            imageItems.innerHTML = '';
            
            images.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `
                    <img src="${img.src}" alt="${img.name}">
                    <span>${img.name}</span>
                    <button class="remove-btn" onclick="removeImage(${idx})">O'chirish</button>
                `;
                imageItems.appendChild(div);
            });

            generateBtn.disabled = images.length === 0;
        }

        function removeImage(idx) {
            images.splice(idx, 1);
            updateImageList();
        }

        clearBtn.addEventListener('click', () => {
            images = [];
            updateImageList();
            fileInput.value = '';
            previewSection.style.display = 'none';
            gifBlob = null;
        });

        generateBtn.addEventListener('click', generateGIF);

        async function generateGIF() {
            if (images.length === 0) {
                showStatus('Avval rasmlarni yuklang!', 'error');
                return;
            }

            generateBtn.disabled = true;
            showStatus('GIF yaratilmoqda... bir muncha vaqt olishi mumkin', 'info');

            try {
                const duration = Math.round(parseFloat(document.getElementById('duration').value) * 1000);
                const quality = parseInt(document.getElementById('quality').value);

                const gif = new GIF({
                    workers: 2,
                    quality: quality,
                    width: 1080,
                    height: 1920,
                    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
                });

                let processedCount = 0;

                function processImage(index) {
                    if (index >= images.length) {
                        gif.render();
                        return;
                    }

                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 1080;
                        canvas.height = 1920;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.fillStyle = '#000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        const scale = Math.min(
                            canvas.width / img.width,
                            canvas.height / img.height
                        );
                        const x = (canvas.width - img.width * scale) / 2;
                        const y = (canvas.height - img.height * scale) / 2;
                        
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                        gif.addFrame(canvas, { delay: duration });
                        
                        processedCount++;
                        showStatus(`GIF yaratilmoqda: ${Math.round((processedCount / images.length) * 100)}%`, 'info');
                        
                        processImage(index + 1);
                    };
                    img.onerror = () => {
                        processedCount++;
                        processImage(index + 1);
                    };
                    img.src = images[index].src;
                }

                gif.on('finished', function(blob) {
                    gifBlob = blob;
                    const gifUrl = URL.createObjectURL(blob);
                    preview.src = gifUrl;
                    previewSection.style.display = 'block';
                    showStatus('✅ GIF tayyor! Yuklab oling.', 'success');
                    generateBtn.disabled = false;
                });

                gif.on('error', function(error) {
                    showStatus('Xato: ' + error, 'error');
                    generateBtn.disabled = false;
                });

                processImage(0);

            } catch (error) {
                showStatus('Xato: ' + error.message, 'error');
                generateBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', () => {
            if (!gifBlob) return;
            const url = URL.createObjectURL(gifBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'slideshow_' + new Date().getTime() + '.gif';
            a.click();
            URL.revokeObjectURL(url);
        });

        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status show ' + type;
            if (type !== 'info') {
                setTimeout(() => status.classList.remove('show'), 5000);
            }
        }
    </script>
</body>
</html>
